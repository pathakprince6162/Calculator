<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatpr</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <main>
        
        <div class="big-container">
            <h1 >Basic-Calculator</h1>
            <div class="display">
                <!-- <input type="number" > -->
            </div>
            <div class="content-box">
                <div class="numbers">
                    <button class="num" id="one">1</button>
                    <button class="num" id="two">2</button>
                    <button class="num" id="three">3</button>
                    <button class="num" id="four">4</button>
                    <button class="num" id="five">5</button>
                    <button class="num" id="six">6</button>
                    <button class="num" id="seven">7</button>
                    <button class="num" id="eight">8</button>
                    <button class="num" id="nine">9</button>
                    <button class="num" id="dot">.</button>
                    <button class="num" id="jeroo">0</button>
                    <button class="num" id="jerojero">00</button>
                </div>
                <div class="op-equal">
                    <div class="operators" id="operators">
                        <div class="AC">
                    <button class="ac" id="ac">AC</button>
                         </div>
                    <button class="signs" id="add">+</button>
                    <button class="signs" id="sub">-</button>
                    <button class="signs" id="mul">X</button>
                    <button class="signs" id="div">/</button>
                 
                    <!-- <button class="signsequal" id="equal">=</button> -->    
                </div>
                     <div class="equal">
                        <button class="signsequal" id="equal">=</button>
                     </div> 
                </div>
            </div>

        </div>



    </main>
    <script src="index.js"></script>
</body>
</html>
